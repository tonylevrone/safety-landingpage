name: supabase-keepalive

# Mantém o projeto Supabase (free tier) sempre ativo: o plano gratuito
# PAUSA após ~7 dias sem requisições. Este job faz um ping leve no REST
# a cada 2 dias para que o login/inventário do app demo (gestaosafetyz.com.br)
# nunca quebre por inatividade. Roda na nuvem do GitHub — independe do PC.
#
# A chave abaixo é a anon key (pública por design, protegida por RLS) —
# a mesma já embutida no app/landing. Não é segredo.

on:
  schedule:
    - cron: '17 12 */2 * *'   # a cada 2 dias, 12:17 UTC
  workflow_dispatch:           # permite rodar manualmente pelo botão "Run workflow"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwbXd3eXNuYnVncWFtb2JzYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTg4MTEsImV4cCI6MjA5NTQ5NDgxMX0.iEBot1oyzL02y2LMYlJDPv88u17OEQzhmIN8UoIy7hY"
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://epmwwysnbugqamobsbnf.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: $ANON" \
            -H "Authorization: Bearer $ANON")
          echo "Supabase respondeu HTTP $CODE"
          # 200 (lista vazia por RLS) é o esperado. Qualquer 2xx/4xx conta como atividade.
          if [ "$CODE" -ge 500 ]; then echo "Erro do servidor"; exit 1; fi
